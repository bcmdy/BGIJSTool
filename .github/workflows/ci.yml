name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build (Release)
      run: dotnet build BGIJSTool.csproj -c Release --nologo

    - name: Test (Release)
      run: dotnet test BGIJSTool.Tests/BGIJSTool.Tests.csproj -c Release --nologo
