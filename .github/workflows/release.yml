name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      self_contained:
        description: 'Self-contained deployment (includes .NET runtime)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Determine build mode
      id: build_mode
      shell: pwsh
      run: |
        echo "self_contained=${{ inputs.self_contained }}" >> $env:GITHUB_OUTPUT
        if ("${{ github.event.release.tag_name }}") {
          echo "version=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
        } elseif ("${{ github.ref_name }}") {
          echo "version=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
        } else {
          echo "version=dev" >> $env:GITHUB_OUTPUT
        }

    - name: Build (Release)
      run: dotnet build BGIJSTool.csproj -c Release --nologo

    - name: Test
      shell: pwsh
      run: |
        $testProjects = Get-ChildItem -Recurse -Filter "*.Tests.csproj"
        if ($testProjects.Count -eq 0) {
          Write-Host "No test project found, skip dotnet test."
          exit 0
        }
        foreach ($project in $testProjects) {
          dotnet test $project.FullName -c Release --nologo
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        }

    - name: Publish (Framework-Dependent)
      if: steps.build_mode.outputs.self_contained != 'true'
      run: |
        dotnet publish BGIJSTool.csproj -c Release -r win-x64 `
          -p:PublishSingleFile=true `
          -p:SelfContained=false `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:DebugType=none `
          -p:DebugSymbols=false `
          --self-contained false `
          -o ./publish

    - name: Publish (Self-Contained)
      if: steps.build_mode.outputs.self_contained == 'true'
      run: |
        dotnet publish BGIJSTool.csproj -c Release -r win-x64 `
          -p:PublishSingleFile=true `
          -p:SelfContained=true `
          -p:PublishReadyToRun=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:EnableCompressionInSingleFile=true `
          -p:TrimUnusedCode=true `
          -p:DebugType=none `
          -p:DebugSymbols=false `
          --self-contained true `
          -o ./publish

    - name: Copy auxiliary files
      shell: pwsh
      run: |
        if (Test-Path ./copy) {
          New-Item -ItemType Directory -Force -Path ./publish/copy | Out-Null
          Copy-Item -Path ./copy/* -Destination ./publish/copy -Recurse -Force
        }
        if (Test-Path ./config.json) { Copy-Item -Path ./config.json -Destination ./publish -Force }
        if (Test-Path ./README.md) { Copy-Item -Path ./README.md -Destination ./publish -Force }
        if (Test-Path ./SPEC.md) { Copy-Item -Path ./SPEC.md -Destination ./publish -Force }

    - name: Create ZIP archive
      shell: pwsh
      run: Compress-Archive -Path ./publish/* -DestinationPath BGIJSTool.zip -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BGIJSTool-${{ steps.build_mode.outputs.version }}
        path: BGIJSTool.zip
        retention-days: 7

  release:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'release'
    steps:
    - name: Checkout with full history
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: BGIJSTool-${{ github.event.release.tag_name }}
        path: .

    - name: Generate changelog
      id: changelog
      shell: pwsh
      run: |
        $currentTag = "${{ github.event.release.tag_name }}"
        $tags = git tag --sort=-v:refname
        $previousTag = ($tags | Where-Object { $_ -lt $currentTag } | Select-Object -First 1)
        if ($previousTag) {
          $commits = git log --oneline "$previousTag..$currentTag"
        } else {
          $commits = git log --oneline -20
        }
        $changelog = ($commits | ForEach-Object { "- $_" }) -join "`n"
        echo "content<<EOF" >> $env:GITHUB_OUTPUT
        echo "$changelog" >> $env:GITHUB_OUTPUT
        echo "EOF" >> $env:GITHUB_OUTPUT

    - name: Calculate SHA256
      id: hash
      shell: pwsh
      run: |
        $hash = (Get-FileHash -Algorithm SHA256 -Path ./BGIJSTool.zip).Hash.ToLower()
        $size = [math]::Round((Get-Item ./BGIJSTool.zip).Length / 1MB, 2)
        echo "sha256=$hash" >> $env:GITHUB_OUTPUT
        echo "size=$size" >> $env:GITHUB_OUTPUT

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: BGIJSTool.zip
        body: |
          ## BGIJSTool v${{ github.event.release.tag_name }}

          ### 更新记录
          ${{ steps.changelog.outputs.content }}

          ### 下载
          - **BGIJSTool.zip** - 包含主程序、默认配置、copy 辅助包、README.md 和 SPEC.md。

          ### 部署模式
          - Framework-Dependent：体积更小，目标机器需要安装 .NET 8 Desktop Runtime。
          - Self-Contained：体积更大，包含 .NET 运行时，目标机器无需额外安装运行时。

          ### 文件信息
          - SHA256: `${{ steps.hash.outputs.sha256 }}`
          - 大小: `${{ steps.hash.outputs.size }} MB`

          ### 使用说明
          1. 解压 BGIJSTool.zip。
          2. 运行 BGIJSTool.exe。
          3. 配置 BetterGI 路径和 config.json 后即可使用。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
